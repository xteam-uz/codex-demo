version: '3.8'
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: surart
      MYSQL_ROOT_PASSWORD: root
    ports: ['3306:3306']
  backend:
    image: php:8.3-fpm
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports: ['5173:5173']
  admin:
    image: node:20
    working_dir: /app
    volumes:
      - ./admin:/app
    command: sh -c "npm install && npm run dev -- --host --port 5174"
    ports: ['5174:5174']
